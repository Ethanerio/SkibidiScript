<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gen Alpha SkibidiScript</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        textarea { width: 100%; height: 200px; font-family: monospace; font-size: 16px; }
        button { font-size: 16px; margin-top: 10px; padding: 10px; }
        pre { background: #222; color: #0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Gen Alpha SkibidiScript Web REPL</h1>
    <textarea id="code" placeholder="Write your .skibidi code here..."></textarea><br>
    <button onclick="runSkibidi()">Run Code 🚀</button>
    <h2>Output:</h2>
    <pre id="output"></pre>

    <script>
        let pyodideReadyPromise = loadPyodide();

        async function runSkibidi() {
            const code = document.getElementById("code").value;
            const outputElem = document.getElementById("output");
            outputElem.textContent = "";

            const pyodide = await pyodideReadyPromise;

            try {
                // Redirect print to outputElem
                pyodide.runPython(`
import sys
from js import console, document

class OutputCatcher:
    def write(self, s):
        document.getElementById("output").textContent += s
    def flush(self):
        pass

sys.stdout = OutputCatcher()
sys.stderr = OutputCatcher()
`);

                // Load your SkibidiScript compiler
                await pyodide.runPythonAsync(await (await fetch("skibidi_compiler.py")).text());

                // Run the SkibidiScript code
                pyodide.globals.set("skibidi_code", code);
                pyodide.runPython(`
python_code = translate(skibidi_code)
execute(python_code)
`);
            } catch (err) {
                outputElem.textContent += "💀 Error: " + err;
            }
        }
    </script>
</body>
</html>
